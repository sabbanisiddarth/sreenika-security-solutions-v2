name: Keep Warm Automation

on:
  schedule:
    - cron: '0 0 */3 * *' # Triggers every 3 days at midnight
  workflow_dispatch: # Allows manual triggers from GitHub UI

jobs:
  keep_warm:
    name: Ping Vercel Deployment Node
    runs-on: ubuntu-latest
    steps:
      - name: Ping HTTPS Live Endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" -I "https://sreenika-security-solutions-v2.vercel.app"
