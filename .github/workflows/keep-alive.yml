name: Vercel Keep-Alive Automation

on:
  schedule:
    # Run at 00:00 every 3 days
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping-landing-page:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Landing Page to Keep it Active
        run: |
          URL="https://sreenika-security-solutions.vercel.app"
          echo "Pinging Vercel Landing Page at $URL..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "Vercel Response Status Code: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 301 ] || [ "$RESPONSE" -eq 302 ]; then
            echo "SUCCESS: Successfully connected to SSS landing page."
          else
            echo "WARNING: Received unexpected status code $RESPONSE."
            exit 1
          fi
